<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
<title id="title">WakilKita Pandan constituency dashboard illustration</title>
<desc id="desc">A trust-safe product UI illustration showing P100 Pandan public data cards, issue priorities and source-needed labels. It is illustrative, not live civic data.</desc>
