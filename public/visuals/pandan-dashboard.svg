  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#071613" flood-opacity="0.18"/></filter>
</defs>
<rect width="1440" height="960" fill="url(#bg)"/>
<circle cx="1320" cy="104" r="260" fill="#ddf7e8" opacity="0.72"/>
<circle cx="92" cy="820" r="240" fill="#efd994" opacity="0.35"/>
