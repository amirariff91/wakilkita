<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
<title id="title">Privacy-preserving preference signal flow</title>
<desc id="desc">Diagram showing identity check separated from eligibility token, preference record, aggregate result and public audit notes.</desc>
<rect width="1440" height="900" fill="#f7f0e4"/>
<path d="M0 760 C220 660 380 840 620 700 C850 570 980 670 1440 520 L1440 900 L0 900 Z" fill="#ddf7e8" opacity="0.72"/>
<text x="110" y="120" fill="#084733" font-family="Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="5">WAKILKITA TRUST FLOW</text>
<text x="110" y="178" fill="#071613" font-family="Georgia, serif" font-size="58" font-weight="900">Separate identity from support.</text>
<g font-family="Arial, sans-serif" font-weight="900">
  <g transform="translate(120 280)"><rect width="250" height="250" rx="42" fill="#071613"/><text x="36" y="70" fill="#ddf7e8" font-size="18" letter-spacing="3">STEP 01</text><text x="36" y="126" fill="white" font-size="34">Identity</text><text x="36" y="168" fill="white" font-size="34">check</text><text x="36" y="215" fill="#ffffffaa" font-size="18">External eKYC in future pilot</text></g>
  <path d="M390 405 L470 405" stroke="#0f6b4d" stroke-width="12" stroke-linecap="round"/><path d="M455 374 L492 405 L455 436" fill="none" stroke="#0f6b4d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(510 280)"><rect width="250" height="250" rx="42" fill="white" stroke="#d8ccbb" stroke-width="3"/><text x="36" y="70" fill="#d99a1e" font-size="18" letter-spacing="3">STEP 02</text><text x="36" y="126" fill="#071613" font-size="34">Eligibility</text><text x="36" y="168" fill="#071613" font-size="34">token</text><text x="36" y="215" fill="#33413d" font-size="18">Pandan-only, one-use</text></g>
  <path d="M780 405 L860 405" stroke="#0f6b4d" stroke-width="12" stroke-linecap="round"/><path d="M845 374 L882 405 L845 436" fill="none" stroke="#0f6b4d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(900 280)"><rect width="250" height="250" rx="42" fill="white" stroke="#d8ccbb" stroke-width="3"/><text x="36" y="70" fill="#d99a1e" font-size="18" letter-spacing="3">STEP 03</text><text x="36" y="126" fill="#071613" font-size="34">Preference</text><text x="36" y="168" fill="#071613" font-size="34">record</text><text x="36" y="215" fill="#33413d" font-size="18">No IC in signal table</text></g>
</g>
<g transform="translate(304 630)">
  <rect width="832" height="130" rx="38" fill="#084733"/>
  <text x="46" y="55" fill="#ddf7e8" font-family="Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">PUBLIC OUTPUT</text>
  <text x="46" y="96" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="900">Threshold-protected aggregate totals + audit notes only</text>
</g>
<text x="110" y="842" fill="#33413d" font-family="Arial, sans-serif" font-size="21" font-weight="700">Illustrative architecture diagram. It does not imply a live verification backend or official election process.</text>
</svg>